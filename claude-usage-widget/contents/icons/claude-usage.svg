<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <circle cx="32" cy="32" r="30" fill="#1e1e22"/>

  <!-- Weekly track (outer, r=23) -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#FFB347" stroke-width="5" stroke-opacity="0.2"/>
  <!-- Weekly fill ~75% — start top (32,9), end left (9,32), large-arc=1 clockwise -->
  <path d="M 32 9 A 23 23 0 1 1 9 32"
        fill="none" stroke="#FFB347" stroke-width="5" stroke-linecap="round"/>

  <!-- Session track (inner, r=13) -->
  <circle cx="32" cy="32" r="13" fill="none" stroke="#FF7300" stroke-width="5" stroke-opacity="0.2"/>
  <!-- Session fill ~40% — start top (32,19), end at 54° from center -->
  <path d="M 32 19 A 13 13 0 0 1 39.64 42.52"
        fill="none" stroke="#FF7300" stroke-width="5" stroke-linecap="round"/>
</svg>
